name: Supabase Keepalive

# Supabase pauses free-tier projects after ~7 days with no database activity.
# This opens a direct Postgres connection every few days and bumps a timestamp
# in the `keepalive` table, keeping the project awake whether or not it's used.
#
# NOTE: PostgREST/API pings do NOT count toward Supabase's pause clock — the
# project paused on 2026-06-30 despite successful REST pings — so this uses a
# real authenticated database connection instead.
#
# Requires one repo secret (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL  the Session-pooler connection string (IPv4), e.g.
#   postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres

on:
  schedule:
    # Every 3 days at 07:23 UTC. The 7-day pause window means a 3-day cadence
    # still stays safe even if one run is skipped or delayed by GitHub.
    - cron: '23 7 */3 * *'
  workflow_dispatch: {} # lets you trigger a manual test run from the Actions tab

# Needed so the keepalive-commit step below can push to the repo.
permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Ping the database directly (real Postgres activity)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set."
            exit 1
          fi

          # A direct authenticated Postgres connection + query is the most
          # literal "database request" there is — far more likely to register
          # as activity than a PostgREST/API call, which Supabase did NOT count
          # (the project paused on 2026-06-30 despite green REST pings).
          if ! command -v psql >/dev/null 2>&1; then
            echo "psql not found; installing postgresql-client..."
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi

          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -c \
            "insert into keepalive (id, last_ping) values (1, now()) on conflict (id) do update set last_ping = now();"

          echo "Direct Postgres keepalive succeeded."

      - name: Keep workflow enabled (commit only if repo idle ~45 days)
        run: |
          set -euo pipefail

          LAST=$(git log -1 --format=%ct)
          NOW=$(date -u +%s)
          AGE_DAYS=$(( (NOW - LAST) / 86400 ))
          echo "Last commit was ${AGE_DAYS} day(s) ago."

          # GitHub auto-disables scheduled workflows after 60 days with no repo
          # activity. A push resets that timer, so if the repo has gone quiet we
          # make a tiny empty commit. The 45-day threshold leaves margin before
          # the 60-day cutoff. Commits pushed with GITHUB_TOKEN don't trigger new
          # workflow runs, so this can't cause a loop.
          if [ "${AGE_DAYS}" -ge 45 ]; then
            echo "Repo idle ${AGE_DAYS}d — pushing a keepalive commit."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive commit to keep scheduled workflow enabled"
            git push
          else
            echo "No keepalive commit needed (under 45 days)."
          fi
