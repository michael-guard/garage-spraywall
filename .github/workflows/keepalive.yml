name: Supabase Keepalive

# Supabase pauses free-tier projects after ~7 days with no external API
# activity. This pings the REST API to bump a timestamp in the `keepalive`
# table, keeping the project awake whether or not the app gets used.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       e.g. https://abcdefgh.supabase.co
#   SUPABASE_ANON_KEY  the public anon key (same one the app ships)

on:
  schedule:
    # Every 3 days at 07:23 UTC. The 7-day pause window means a 3-day cadence
    # still stays safe even if one run is skipped or delayed by GitHub.
    - cron: '23 7 */3 * *'
  workflow_dispatch: {} # lets you trigger a manual test run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::SUPABASE_URL and/or SUPABASE_ANON_KEY secrets are not set."
            exit 1
          fi

          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Pinging keepalive at ${TS}"

          STATUS=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/keepalive?on_conflict=id" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d "{\"id\": 1, \"last_ping\": \"${TS}\"}")

          echo "HTTP ${STATUS}"
          echo "Response: $(cat /tmp/resp.txt)"

          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "::error::Keepalive ping failed (HTTP ${STATUS})."
            exit 1
          fi

          echo "Keepalive ping succeeded."
